<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css/styles.css">
        <script src="https://kit.fontawesome.com/2b57d9cd28.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
        <h2 class="heading">Todo list app</h2>
        <ul class="todo-list">
            <li class="todo-item">
            <input type="checkbox"  id="item1">
            <label for="item1">Drink water</label>
           </li>
            <li class="todo-item">
                <input type="checkbox" id="item2">
               <label for="item2"> Do laundry </label>
            </li>
            <li class="todo-item">
                <input type="checkbox" id="item3">
               <label for="item3"> Solve mechanics </label>
            </li>
            <li class="todo-item">
                <input type="checkbox" id="item4">
               <label for="item4"> Visit the site </label>
            </li>
            <li class="todo-item">
                <input type="checkbox" id="item5">
              <label for="item5">  Come up with a report </label>
            </li>
        </ul>
        <div class="form-row">
            <input type="text" class="input-box" placeholder="add item"><br>
            <button class="button type1"><span class="btn-txt">Add</span></button>
        </div>
        </div>
    </body>
</html>
